<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CDelgado - Groups</title>
    <!-- Font Awesome 6 (iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: tipografía limpia y elegante -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Fondo con gradiente gris oscuro profundo, toque de refinamiento */
            background: radial-gradient(circle at 20% 30%, #1a1a1c, #0b0b0e);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Tarjeta principal - bordes casi rectos (4px de radio, muy sutil) */
        .card {
            max-width: 520px;
            width: 100%;
            background: #141416;
            border-radius: 4px;          /* menos redondeado, estilo profesional */
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 140, 0, 0.12);
            padding: 2rem 2rem 2.2rem;
            transition: all 0.25s ease;
            text-align: center;
            backdrop-filter: blur(0px);
        }

        /* Efecto de iluminación naranja en los bordes laterales sutiles */
        .card:hover {
            box-shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 100, 0, 0.35);
            transform: translateY(-2px);
        }

        /* Foto centrada con marco minimalista oscuro */
        .foto-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 1.8rem;
        }

        .foto-perfil {
            width: 120px;
            height: 120px;
            border-radius: 2px;     /* casi cuadrado elegante, nada redondeado */
            object-fit: cover;
            border: 2px solid #2e2e32;
            box-shadow: 0 0 0 1px #ff6a1a30, 0 8px 20px rgba(0, 0, 0, 0.3);
            background-color: #1f1f23;
            transition: all 0.2s;
        }

        /* Tipografía oscura / clara con contraste */
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f5f5f5 30%, #cfcfcf 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }

        .subtitulo {
            color: #b9a27b;        /* tono arena/naranja apagado */
            font-weight: 500;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid #2c2c30;
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        /* Lista de botones (solo enlaces a grupos) - estilo profesional oscuro */
        .grupos-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.9rem;
            background: #1f1f23;
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 2px;      /* bordes rectos, toque industrial */
            transition: all 0.2s ease;
            border: 1px solid #2e2e32;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .btn-whatsapp i {
            font-size: 1.4rem;
            color: #ff8c42;          /* naranja Hugo Boss (acento) */
            transition: transform 0.1s;
        }

        .btn-whatsapp span {
            flex: 0 0 auto;
        }

        /* Efecto hover con iluminación naranja y fondo más oscuro */
        .btn-whatsapp:hover {
            background: #0c0c0e;
            border-color: #ff8c42;
            color: #ffffff;
            box-shadow: 0 0 8px rgba(255, 140, 66, 0.3);
            transform: translateY(-1px);
        }

        .btn-whatsapp:hover i {
            color: #ffb347;
            text-shadow: 0 0 3px #ff8c4270;
        }

        /* Footer minimalista oscuro */
        .footer-note {
            margin-top: 2.2rem;
            font-size: 0.68rem;
            color: #6a6a70;
            background: #0e0e10;
            padding: 0.7rem;
            border-left: 2px solid #ff8c42;
            text-align: center;
            letter-spacing: 0.4px;
            font-weight: 400;
        }

        /* Responsivo: ajustes elegantes */
        @media (max-width: 520px) {
            body {
                padding: 1rem;
            }
            .card {
                padding: 1.5rem;
            }
            .btn-whatsapp {
                font-size: 0.9rem;
                padding: 0.8rem;
                gap: 0.7rem;
            }
            .foto-perfil {
                width: 100px;
                height: 100px;
            }
            h1 {
                font-size: 1.6rem;
            }
        }

        /* efecto de foco naranja en active */
        .btn-whatsapp:active {
            transform: translateY(1px);
            background: #000000;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Fotografía centrada (imagen ejecutiva / neutral) -->
        <div class="foto-wrapper">
            <img class="foto-perfil" 
                 src="https://ui-avatars.com/api/?background=2C2C30&color=ff8c42&rounded=false&size=120&fontsize=0.5&bold=true&name=CD" 
                 alt="Profile Executive">
        </div>

        <h1>César Delgado</h1>
        <div class="subtitulo">Coordinación escolar</div>

        <!-- SOLO botones de enlaces para grupos de WhatsApp -->
        <div class="grupos-list">
            <a href="#" class="btn-whatsapp" data-placeholder="https://chat.whatsapp.com/G1UJDxr8HiwBh4fPvwzKBY?mode=gi_t">
                <i class="fab fa-whatsapp"></i> <span>PE01</span>
            </a>
            <a href="#" class="btn-whatsapp" data-placeholder="https://chat.whatsapp.com/FRjtCPYU3eZ8Jy9WNbbhrm?mode=gi_t">
                <i class="fab fa-whatsapp"></i> <span>PE02</span>
            </a>
        </div>
        <div class="footer-note">
            <i class="fas fa-phone" style="margin-right: 6px; color:#ff8c42;"></i> 55-6173-0068
        </div>
    </div>

    <script>
        // Helper para indicar que los enlaces son ejemplo hasta que se personalicen (sin molestar demasiado)
        const botones = document.querySelectorAll('.btn-whatsapp');
        botones.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const href = btn.getAttribute('href');
                const placeholderBase = btn.getAttribute('data-placeholder');
                if (!href || href === '#' || href === placeholderBase || href === '') {
                    e.preventDefault();
                    alert('No disponible');
                }
            });
        });
    </script>
</body>
</html>
